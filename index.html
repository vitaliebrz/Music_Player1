<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <script src="https://kit.fontawesome.com/4ce356a29a.js" crossorigin="anonymous"></script>

</head>
<body>
    <div class="container">
        <img id="trackImage">
        <h2 id="trackTitle"></h2>
        <audio src="" id="audio"></audio>
        <div class="controls">
            <button id="prev-track"><i class="fa-solid fa-backward"></i></button>
            <button id="play-track"><i class="fa-solid fa-play"></i></button>
            <button id="next-track"><i class="fa-solid fa-forward"></i></button>
        </div>
    </div>
</body>
</html>
